name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # 前端质量检查
  frontend:
    name: Frontend Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run build

      - name: ESLint
        run: npm run lint

  # Linux 构建
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libspeechd-dev \
            libxdo-dev \
            libssl3 \
            libasound2 \
            libxcb-cursor-dev \
            patchelf \
            clang \
            build-essential \
            libxcb-shape-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Rust dependencies
        working-directory: src-tauri
        run: cargo fetch

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: v__VERSION__
          releaseName: "CEOClaw v__VERSION__"
          releaseBody: |
            查看 [更新日志](https://github.com/${{ github.repository }}/releases/tag/v__VERSION__) 了解详情。
          releaseDraft: true
          prerelease: false
          skipSubmission: true
          skipSigning: true
          deferRelease: true

  # macOS 构建
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Rust dependencies
        working-directory: src-tauri
        run: cargo fetch

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: v__VERSION__
          releaseName: "CEOClaw v__VERSION__"
          releaseBody: |
            查看 [更新日志](https://github.com/${{ github.repository }}/releases/tag/v__VERSION__) 了解详情。
          releaseDraft: true
          prerelease: false
          skipSubmission: true
          skipSigning: true
          deferRelease: true

  # Windows 构建
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Rust dependencies
        working-directory: src-tauri
        run: cargo fetch

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: v__VERSION__
          releaseName: "CEOClaw v__VERSION__"
          releaseBody: |
            查看 [更新日志](https://github.com/${{ github.repository }}/releases/tag/v__VERSION__) 了解详情。
          releaseDraft: true
          prerelease: false
          skipSubmission: true
          skipSigning: true
          deferRelease: true
