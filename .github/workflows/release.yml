name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # 创建 GitHub Release
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_name: ${{ steps.release.outputs.release_name }}
      release_id: ${{ steps.release.outputs.release_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "CEOClaw v${{ steps.version.outputs.VERSION }}"
          draft: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          generate_release_notes: true

  # Linux 构建
  build-linux:
    name: Build Linux
    needs: release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libspeechd-dev \
            libxdo-dev \
            libssl3 \
            libasound2 \
            libxcb-cursor-dev \
            patchelf \
            clang \
            build-essential \
            libxcb-shape-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Rust dependencies
        working-directory: src-tauri
        run: cargo fetch

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "CEOClaw v__VERSION__"
          releaseBody: |
            查看 [更新日志](https://github.com/${{ github.repository }}/releases/tag/v__VERSION__) 了解详情。
          releaseDraft: false
          prerelease: false
          skipSubmission: false
          skipSigning: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY == '' }}
          deferRelease: false
          uploadUrl: ${{ needs.release.outputs.upload_url }}

  # macOS 构建
  build-macos:
    name: Build macOS
    needs: release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Rust dependencies
        working-directory: src-tauri
        run: cargo fetch

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "CEOClaw v__VERSION__"
          releaseBody: |
            查看 [更新日志](https://github.com/${{ github.repository }}/releases/tag/v__VERSION__) 了解详情。
          releaseDraft: false
          prerelease: false
          skipSubmission: false
          skipSigning: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY == '' }}
          deferRelease: false
          uploadUrl: ${{ needs.release.outputs.upload_url }}

  # Windows 构建
  build-windows:
    name: Build Windows
    needs: release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Rust dependencies
        working-directory: src-tauri
        run: cargo fetch

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "CEOClaw v__VERSION__"
          releaseBody: |
            查看 [更新日志](https://github.com/${{ github.repository }}/releases/tag/v__VERSION__) 了解详情。
          releaseDraft: false
          prerelease: false
          skipSubmission: false
          skipSigning: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY == '' }}
          deferRelease: false
          uploadUrl: ${{ needs.release.outputs.upload_url }}
